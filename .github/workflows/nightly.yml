name: Nightly Dev Build

permissions:
  contents: write

on:
  schedule:
    - cron: '0 6 * * *' # 06:00 UTC daily
  workflow_dispatch:

jobs:
  tag:
    name: Tag dev release if new commits exist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: development
          fetch-depth: 0
          token: ${{ secrets.RELEASE_TOKEN }}

      - name: Check for new commits and tag
        run: |
          set -euo pipefail

          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")

          if [ -n "$LAST_TAG" ]; then
            COMMITS=$(git rev-list "${LAST_TAG}..HEAD" --count)
            if [ "$COMMITS" -eq "0" ]; then
              echo "No new commits since ${LAST_TAG} — skipping dev build."
              exit 0
            fi
            echo "${COMMITS} new commit(s) since ${LAST_TAG}."
          fi

          # Compute the base version for the next release.
          # If current version is already a pre-release (e.g. 1.37.0-beta.1),
          # use that base (1.37.0). Otherwise bump the patch.
          CURRENT=$(jq -r '.version' package.json)
          if [[ "$CURRENT" == *"-"* ]]; then
            NEXT_BASE="${CURRENT%%-*}"
          else
            IFS=. read -r MAJOR MINOR PATCH <<< "$CURRENT"
            NEXT_BASE="${MAJOR}.${MINOR}.$((PATCH + 1))"
          fi

          # Find the highest existing dev N for this base version and increment.
          LATEST_N=$(git tag -l "v${NEXT_BASE}-dev.*" | sed "s/.*-dev\.//" | sort -n | tail -1)
          if [ -z "$LATEST_N" ]; then
            NEXT_N=1
          else
            NEXT_N=$((LATEST_N + 1))
          fi
          NEW_TAG="v${NEXT_BASE}-dev.${NEXT_N}"

          echo "Creating tag ${NEW_TAG}..."
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "$NEW_TAG"
          git push origin "$NEW_TAG"
