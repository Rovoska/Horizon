name: Nightly Dev Build

permissions:
  contents: write

on:
  schedule:
    - cron: '0 6 * * *' # 06:00 UTC daily
  workflow_dispatch:

jobs:
  tag:
    name: Tag dev release if new commits exist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: development
          fetch-depth: 0
          token: ${{ secrets.RELEASE_TOKEN }}

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check for new commits
        id: check
        run: |
          set -euo pipefail

          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")

          if [ -n "$LAST_TAG" ]; then
            COMMITS=$(git rev-list "${LAST_TAG}..HEAD" --count)
            if [ "$COMMITS" -eq "0" ]; then
              echo "No new commits since ${LAST_TAG} — skipping dev build."
              echo "skip=true" >> $GITHUB_OUTPUT
            else
              echo "${COMMITS} new commit(s) since ${LAST_TAG}."
              echo "skip=false" >> $GITHUB_OUTPUT
            fi
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Bump version and tag
        if: steps.check.outputs.skip != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          pnpm release-it --ci --preRelease=dev -c .release-it.nightly.json
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN }}
