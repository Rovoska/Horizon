name: Nightly Build

permissions:
  contents: write
  actions: read

on:
  schedule:
    - cron: '0 6 * * *' # 06:00 UTC daily
  workflow_dispatch:

jobs:
  build:
    name: Nightly (${{ matrix.platform }}-${{ matrix.arch }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
            arch: x64
          - os: ubuntu-latest
            platform: linux
            arch: arm64
          - os: macos-26
            platform: macos
            arch: x64
          - os: macos-26
            platform: macos
            arch: arm64
          - os: windows-latest
            platform: windows
            arch: x64
          - os: windows-latest
            platform: windows
            arch: arm64
    steps:
      - name: Get build info
        id: info
        shell: bash
        run: |
          echo "version=nightly" >> $GITHUB_OUTPUT
          echo "sha=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT
          echo "date=$(date -u +%Y-%m-%d)" >> $GITHUB_OUTPUT

      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          ref: development

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'

      - name: Install OS-specific Dependencies (Linux)
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libsecret-1-dev

      - name: Install OS-specific Dependencies (macOS)
        if: matrix.platform == 'macos'
        run: brew install python-setuptools

      - name: Install OS-specific Dependencies (Windows)
        if: matrix.platform == 'windows'
        shell: pwsh
        run: npm install --global node-gyp

      - name: Run Build Script (Linux)
        if: matrix.platform == 'linux'
        env:
          PR_VERSION: ${{ steps.info.outputs.version }}
          BUILD_ARCH: ${{ matrix.arch }}
        run: |
          chmod +x electron/release-scripts/linux-dev.sh
          electron/release-scripts/linux-dev.sh "$PR_VERSION" "$GITHUB_WORKSPACE/release_artifacts/linux/$PR_VERSION" "$BUILD_ARCH"

      - name: Run Build Script (macOS)
        if: matrix.platform == 'macos'
        env:
          PR_VERSION: ${{ steps.info.outputs.version }}
          BUILD_ARCH: ${{ matrix.arch }}
        run: |
          chmod +x electron/release-scripts/macos-dev.sh
          electron/release-scripts/macos-dev.sh "$PR_VERSION" "$GITHUB_WORKSPACE/release_artifacts/macos/$PR_VERSION" "$BUILD_ARCH"

      - name: Run Build Script (Windows)
        if: matrix.platform == 'windows'
        env:
          PR_VERSION: ${{ steps.info.outputs.version }}
          BUILD_ARCH: ${{ matrix.arch }}
        shell: pwsh
        run: |
          .\electron\release-scripts\windows-dev.ps1 -ReleaseVersion "$env:PR_VERSION" -ReleasePath "$env:GITHUB_WORKSPACE\release_artifacts\windows\$env:PR_VERSION" -Arch "$env:BUILD_ARCH"

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Horizon-nightly-${{ steps.info.outputs.date }}-${{ steps.info.outputs.sha }}-${{ matrix.platform }}-${{ matrix.arch }}
          path: release_artifacts/**
          retention-days: 7
